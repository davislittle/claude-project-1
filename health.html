<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<meta name="color-scheme" content="dark">
<title>Daily Stack</title>
<style>
:root {
  --bg: #050506;
  --bg-card: rgba(255,255,255,0.04);
  --bg-secondary: rgba(255,255,255,0.035);
  --bg-input: rgba(0,0,0,0.28);
  --bg-input-focus: rgba(0,0,0,0.36);
  --bg-dropdown: rgba(15,15,18,0.96);
  --border: rgba(255,255,255,0.06);
  --border-soft: rgba(255,255,255,0.04);
  --border-strong: rgba(255,255,255,0.12);
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --text-quaternary: #4D4B47;
  --accent: #1D9E75;
  --accent-glow: rgba(29,158,117,0.35);
  --warning: #FF8A4D;
  --warning-bg: rgba(163,45,45,0.10);
  --tag-stack: #D8AB30;
  --tag-stack-bg: rgba(216,171,48,0.15);
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text-secondary); font-family: var(--font); font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(60% 50% at 82% 14%, rgba(224,118,88,0.16) 0%, transparent 60%), radial-gradient(50% 40% at 18% 90%, rgba(180,180,200,0.06) 0%, transparent 60%);
  filter: blur(40px); pointer-events: none; z-index: 0;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px; pointer-events: none; z-index: 1;
}
@keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(-2%,2%); } }
main {
  position: relative; z-index: 2;
  max-width: 720px; margin: 0 auto;
  padding: 56px 20px calc(96px + env(safe-area-inset-bottom));
  padding-top: max(56px, env(safe-area-inset-top, 56px));
}
.section-title {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-tertiary);
  margin: 0 4px 14px; display: flex; align-items: center; gap: 12px;
}
.section-title::before { content: '⚡'; font-size: 14px; opacity: 0.5; }
.stack-card {
  background: var(--bg-card); border-radius: 16px; padding: 22px 22px 18px;
  backdrop-filter: blur(24px) saturate(1.2); -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,0.45);
}
.stack-head { margin-bottom: 12px; }
.sf-eyebrow {
  font-family: var(--font-mono); font-size: 11px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px;
}
.sf-title { font-size: 24px; font-weight: 700; letter-spacing: -0.022em; color: var(--text-primary); line-height: 1.15; margin-bottom: 2px; }
.stack-progress-text { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; margin-top: 6px; }
.stack-progress-track { height: 5px; background: rgba(255,255,255,0.05); border-radius: 999px; overflow: hidden; margin: 14px 0 18px; }
.stack-progress-fill { height: 100%; width: 0%; background: #fff; border-radius: 999px; transition: width 0.5s cubic-bezier(0.22,1,0.36,1); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4); }
.stack-window { margin-bottom: 14px; }
.stack-window-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-soft); }
.stack-window-icon { font-size: 16px; }
.stack-window-title { font-size: 13px; font-weight: 700; color: var(--text-primary); }
.stack-window-time { font-size: 11px; color: var(--text-tertiary); font-weight: 500; }
.stack-item {
  display: grid; grid-template-columns: 32px 1fr auto auto; gap: 10px;
  align-items: center; padding: 10px 12px; border-radius: 10px;
  background: var(--bg-secondary); margin-bottom: 6px;
  border: 1px solid transparent; transition: background 0.2s, border-color 0.2s;
}
.stack-item:hover { background: rgba(255,255,255,0.05); }
.stack-item.taken { background: rgba(29,158,117,0.08); }
.stack-item.taken .stack-item-name { text-decoration: line-through; color: var(--text-tertiary); }
@keyframes pulse-red {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
}
.stack-item.missed { border: 1px solid rgba(239,68,68,0.45); animation: pulse-red 1.5s ease-in-out infinite; }
.stack-item.missed .stack-check { border-color: rgba(239,68,68,0.55); }
.stack-item.taken.missed { animation: none; border-color: transparent; }
.stack-item.taken.missed .stack-check { border-color: var(--accent); }
.stack-check {
  width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border-strong);
  background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: transparent; transition: all 0.2s; flex-shrink: 0; font-family: inherit; padding: 0;
}
.stack-check:hover { border-color: var(--accent); }
.stack-check.checked { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 12px var(--accent-glow); }
.stack-item-body { min-width: 0; }
.stack-item-name { font-size: 14px; font-weight: 600; color: var(--text-primary); line-height: 1.2; display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; outline: none; }
.stack-item-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; outline: none; cursor: text; }
.stack-item-meta:empty::before { content: 'add notes…'; color: var(--text-quaternary); font-style: italic; }
.stack-item-tag { font-family: var(--font-mono); font-size: 10px; padding: 2px 7px; border-radius: 99px; font-weight: 600; letter-spacing: 0.04em; text-transform: lowercase; }
.stack-item-tag.tag-stack { background: var(--tag-stack-bg); color: var(--tag-stack); }
.stack-item-tag.tag-not-ordered { background: var(--warning-bg); color: var(--text-tertiary); }
.stack-low-btn {
  background: transparent; border: 1px solid var(--border-strong); color: var(--text-tertiary);
  font-size: 10px; padding: 5px 9px; border-radius: 6px; cursor: pointer;
  font-family: var(--font-mono); font-weight: 600; letter-spacing: 0.04em; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px; transition: all 0.15s;
}
.stack-low-btn:hover { border-color: rgba(163,45,45,0.4); color: var(--warning); }
.stack-low-btn.is-low { background: var(--warning-bg); border-color: rgba(163,45,45,0.4); color: var(--warning); }
.stack-item-del {
  background: transparent; border: 1px solid var(--border-strong); color: var(--text-tertiary);
  cursor: pointer; font-size: 16px; padding: 4px 10px; border-radius: 6px; opacity: 0.7;
  transition: opacity 0.15s, color 0.15s, border-color 0.15s, background 0.15s;
  font-family: inherit; line-height: 1; min-width: 28px; min-height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
}
.stack-item:hover .stack-item-del { opacity: 1; }
.stack-item-del:hover { color: #FF6B6B; border-color: rgba(239,68,68,0.45); background: rgba(239,68,68,0.08); opacity: 1; }
.stack-window-empty { font-size: 12px; color: var(--text-quaternary); font-style: italic; padding: 8px 12px; }
.stack-ticker {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin-bottom: 14px;
  background: rgba(0,0,0,0.28); border: 1px solid rgba(255,255,255,0.04); border-radius: 10px;
  font-size: 12px; min-height: 36px;
}
.stack-ticker-dot { width: 8px; height: 8px; border-radius: 50%; background: #6BE3A4; flex-shrink: 0; transition: background 0.3s; }
.stack-ticker.status-low .stack-ticker-dot { background: #FF8A4D; }
.stack-ticker.status-missed .stack-ticker-dot { background: #FF6B6B; animation: ticker-pulse 1.5s ease-in-out infinite; }
@keyframes ticker-pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
  50% { box-shadow: 0 0 0 5px rgba(239,68,68,0); }
}
.stack-ticker-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-tertiary); flex-shrink: 0; }
.stack-ticker-sep { color: var(--text-quaternary); flex-shrink: 0; }
.stack-ticker-msg { flex: 1; font-size: 12px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.28s; }
.stack-ticker-msg.is-fading { opacity: 0; }
.stack-ticker-count { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.stack-add-wrap { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border-soft); }
.stack-add-label { margin-bottom: 10px; }
.stack-add-row { display: grid; grid-template-columns: 1fr 1fr 110px 90px; gap: 6px; align-items: center; }
.stack-input { font-size: 13px; padding: 9px 11px; border-radius: 10px; border: 1px solid var(--border-strong); background: var(--bg-input); color: var(--text-primary); font-family: inherit; transition: border-color 0.18s, background 0.18s; }
.stack-input::placeholder { color: var(--text-tertiary); }
.stack-input:focus { outline: none; border-color: rgba(255,255,255,0.40); background: var(--bg-input-focus); }
.stack-select { cursor: pointer; }
.stack-add-btn {
  font-size: 13px; padding: 9px 11px; border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.85);
  background: linear-gradient(180deg, #FFFFFF 0%, #E8E5DD 100%);
  color: #0A0A0B; font-weight: 700; cursor: pointer; font-family: inherit;
  transition: transform 0.12s, box-shadow 0.18s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.55), 0 4px 14px rgba(0,0,0,0.30);
}
.stack-add-btn:hover { transform: translateY(-1px); }
.stack-add-btn:active { transform: scale(0.97); }
.stack-name-wrap { position: relative; }
.stack-search-results {
  position: absolute; top: calc(100% + 6px); left: 0; width: max(100%, 320px);
  background: var(--bg-dropdown); border: 1px solid var(--border-strong); border-radius: 12px;
  max-height: 280px; overflow-y: auto;
  backdrop-filter: blur(20px) saturate(1.2); -webkit-backdrop-filter: blur(20px) saturate(1.2);
  box-shadow: 0 16px 40px rgba(0,0,0,0.65); z-index: 50; padding: 6px;
}
.stack-search-results[hidden] { display: none; }
.stack-result {
  display: flex; gap: 12px; align-items: center; width: 100%; padding: 9px 11px;
  background: transparent; border: none; border-radius: 8px; cursor: pointer;
  text-align: left; font-family: inherit; color: var(--text-secondary); transition: background 0.12s;
}
.stack-result:hover, .stack-result.is-focused { background: rgba(255,255,255,0.06); }
.stack-result-icon { font-size: 17px; flex-shrink: 0; width: 24px; text-align: center; }
.stack-result-body { min-width: 0; flex: 1; }
.stack-result-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
.stack-result-meta { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

/* ── Tab bar ─────────────────────────────────────────────────── */
.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  display: flex; justify-content: center;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(5,5,6,0) 0%, rgba(5,5,6,0.78) 38%, rgba(5,5,6,0.96) 100%);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  pointer-events: none;
}
.tabbar-inner {
  pointer-events: auto; display: flex; width: 100%; max-width: 460px;
  gap: 6px; padding: 6px; background: rgba(20,20,22,0.72);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 18px;
  box-shadow: 0 12px 36px rgba(0,0,0,0.55);
}
.tab {
  flex: 1 1 0; display: inline-flex; align-items: center; justify-content: center;
  gap: 8px; padding: 12px 14px; border-radius: 13px;
  font-size: 14px; font-weight: 600; letter-spacing: 0.01em;
  color: rgba(255,255,255,0.45); text-decoration: none;
  background: transparent; border: 1px solid transparent;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab:hover { color: rgba(255,255,255,0.7); }
.tab[aria-current="page"] { color: #fff; background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.10); }
.tab-icon { font-size: 18px; line-height: 1; }
.tab-label { font-size: 12px; }

@media (max-width: 600px) {
  main { padding: 40px 16px calc(96px + env(safe-area-inset-bottom)); }
  .stack-card { padding: 18px 16px 14px; }
  .stack-item { grid-template-columns: 28px 1fr auto; gap: 8px; }
  .stack-item .stack-low-btn { grid-column: 2 / 4; margin-top: 4px; justify-self: start; }
  .stack-add-row { grid-template-columns: 1fr 1fr; }
  .stack-add-row .stack-add-btn { grid-column: 1 / -1; }
  .stack-add-row .stack-select { grid-column: 1 / -1; }
  .stack-search-results { width: 100%; }
  .tab-label { display: none; }
}

::selection { background: rgba(224,118,88,0.3); color: var(--text-primary); }
::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }
</style>
<script src="topbar.js" defer></script>
</head>
<body>

<main>
  <div class="section-title">Daily Stack</div>
  <div class="stack-card">
    <div class="stack-ticker" id="stackTicker">
      <span class="stack-ticker-dot"></span>
      <span class="stack-ticker-label">STACK</span>

          <option value="anytime">Anytime</option>

        <button id="stackAddBtn" class="stack-add-btn">+ Add</button>

  </div>
</main>

<nav class="tabbar" aria-label="App navigation">
  <div class="tabbar-inner">
    <a href="index.html" class="tab">
      <span class="tab-icon">📋</span>

    <a href="gym.html" class="tab">
      <span class="tab-icon">🏋️</span>
      <span class="tab-label">Gym</span>
    </a>
  </div>
</nav>

    { name: 'NAC', dose: '600–1800mg', window: 'morning', note: 'Glutathione precursor — split doses', icon: '💊', aliases: ['nac', 'n-acetyl cysteine'] },
    { name: 'Alpha-GPC', dose: '300–600mg', window: 'morning', note: 'Choline — focus and learning', icon: '🧠', aliases: ['alpha gpc'] },
    { name: 'Glycine', dose: '3g', window: 'evening', note: 'Body temp drop = better sleep onset', icon: '🌙', aliases: ['glycine'] },
    { name: 'Apigenin', dose: '50mg', window: 'evening', note: 'From chamomile — before bed', icon: '🌙', aliases: ['apigenin'] },
    { name: 'Tongkat ali', dose: '200–400mg', window: 'morning', note: 'Cycle 8 weeks on/off', icon: '🌿', aliases: ['tongkat', 'longjack'] },
    { name: 'Fadogia agrestis', dose: '600mg', window: 'morning', note: 'Cycle 8 weeks on/off', icon: '🌿', aliases: ['fadogia'] },
    { name: 'Multivitamin', dose: '1 serving', window: 'lunch', note: 'Take with food', icon: '💊', aliases: ['multi', 'multivitamin'] },
    { name: 'Berberine', dose: '500mg', window: 'lunch', note: 'Before meals — glucose support', icon: '🌿', aliases: ['berberine'] },
    { name: 'Reishi', dose: '1–2g', window: 'evening', note: 'Calming adaptogen', icon: '🍄', aliases: ['reishi'] },
    { name: 'Cordyceps', dose: '1–3g', window: 'morning', note: 'Energy and endurance', icon: '🍄', aliases: ['cordyceps'] },
  ];

  let todayKey = `stack:taken:${getActiveDate()}`;

  function getItems() {
    const storedVersion = storeGet('stack:version');
    const stored = storeGet('stack:items');
    if (!stored || !Array.isArray(stored) || !stored.length || storedVersion !== TEMPLATE_VERSION) {
      const fresh = JSON.parse(JSON.stringify(STACK_DEFAULTS));
      storeSet('stack:items', fresh);
      storeSet('stack:version', TEMPLATE_VERSION);
      return fresh;
    }
    return stored;
  }
  function setItems(items) { storeSet('stack:items', items); }
  function getTaken() { return storeGet(todayKey) || {}; }
  function setTaken(map) { storeSet(todayKey, map); }
  function getLow() { return storeGet('stack:low') || []; }
  function setLow(arr) { storeSet('stack:low', arr); }

  function toggleTaken(id) { const t = getTaken(); if (t[id]) delete t[id]; else t[id] = Date.now(); setTaken(t); render(); }
  function toggleLow(id) { const l = getLow(); if (l.includes(id)) setLow(l.filter(x => x !== id)); else { l.push(id); setLow(l); } render(); }
  function deleteItem(id) { setItems(getItems().filter(i => i.id !== id)); const t = getTaken(); delete t[id]; setTaken(t); setLow(getLow().filter(x => x !== id)); render(); }
  function addItem(name, dose, windowKey, note = '') {
    const v = String(name || '').trim(); if (!v) return;
    const items = getItems();
    const id = 'custom_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
    items.push({ id, name: v, dose: String(dose || '').trim(), window: ['morning','lunch','evening','anytime'].includes(windowKey) ? windowKey : 'anytime', note: String(note || '').trim(), tag: null, ordered: true });
    setItems(items); render();
  }
  function updateItem(id, field, value) { const items = getItems(); const item = items.find(i => i.id === id); if (!item) return; item[field] = value; setItems(items); }

  function escapeHtml(str) { return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function metaText(item) { const parts = []; if (item.dose) parts.push(item.dose); if (item.note) parts.push(item.note); return parts.join(' · '); }

  function render() {
    const items = getItems(), taken = getTaken(), low = getLow();
    const total = items.length, takenCount = items.filter(i => taken[i.id]).length;
    document.getElementById('stackProgressText').textContent = `${takenCount} / ${total} taken today · resets at 6 AM`;
    document.getElementById('stackProgressBar').style.width = (total === 0 ? 0 : takenCount / total * 100) + '%';

    const groupsEl = document.getElementById('stackGroups');
    groupsEl.innerHTML = '';
    const now = new Date(), nowHour = now.getHours() + now.getMinutes() / 60;

    STACK_WINDOWS.forEach(win => {
      const winItems = items.filter(i => (i.window || 'anytime') === win.key);
      if (!winItems.length) return;
      const group = document.createElement('div');
      group.className = 'stack-window';
      group.innerHTML = `<div class="stack-window-header"><span class="stack-window-icon">${win.icon}</span><span class="stack-window-title">${win.title}</span><span class="stack-window-time">${win.time}</span></div>`;
      const isPastCutoff = win.cutoffHour !== null && nowHour > win.cutoffHour;
      winItems.forEach(item => {
        const isTaken = !!taken[item.id], isLow = low.includes(item.id), isMissed = !isTaken && isPastCutoff;
        const row = document.createElement('div');
        row.className = 'stack-item' + (isTaken ? ' taken' : '') + (isMissed ? ' missed' : '');
        let tagHtml = '';
        if (item.tag === 'stack') tagHtml = '<span class="stack-item-tag tag-stack">stack</span>';
        else if (item.tag === 'not-ordered') tagHtml = '<span class="stack-item-tag tag-not-ordered">not ordered</span>';
        row.innerHTML = `
          <button class="stack-check ${isTaken ? 'checked' : ''}" data-action="toggle" data-id="${item.id}" aria-label="Mark taken">${isTaken ? '✓' : ''}</button>
          <div class="stack-item-body">
            <div class="stack-item-name" data-edit="name" data-id="${item.id}"><span class="stack-item-name-text">${escapeHtml(item.name)}</span>${tagHtml}</div>
            <div class="stack-item-meta" data-edit="meta" data-id="${item.id}">${escapeHtml(metaText(item))}</div>
          </div>
          <button class="stack-low-btn ${isLow ? 'is-low' : ''}" data-action="low" data-id="${item.id}">⚠ Running low</button>
          <button class="stack-item-del" data-action="del" data-id="${item.id}" aria-label="Delete">×</button>`;
        group.appendChild(row);
      });
      groupsEl.appendChild(group);
    });

    if (!groupsEl.children.length) {
      groupsEl.innerHTML = `<div class="stack-window-empty">No supplements yet — add one below to start your stack.</div>`;
    }
    renderTicker();
  }

  let tickerIndex = 0, tickerInterval = null, cachedIssues = [];
  function getStackIssues() {
    const items = getItems(), taken = getTaken(), low = getLow();
    const now = new Date(), nowHour = now.getHours() + now.getMinutes() / 60;
    const missed = [], lowList = [];
    items.forEach(item => {
      const win = STACK_WINDOWS.find(w => w.key === (item.window || 'anytime'));
      if (win && win.cutoffHour !== null && nowHour > win.cutoffHour && !taken[item.id]) missed.push({ type: 'missed', text: `${item.name} — missed ${win.title.toLowerCase()} dose` });
      if (low.includes(item.id)) lowList.push({ type: 'low', text: `${item.name} — running low, reorder soon` });
    });
    return [...missed, ...lowList];
  }
  function renderTicker() {
    const issues = getStackIssues(), tickerEl = document.getElementById('stackTicker');
    const msgEl = document.getElementById('stackTickerMsg'), countEl = document.getElementById('stackTickerCount');
    cachedIssues = issues;
    if (!issues.length) { msgEl.textContent = 'All caught up — keep it rolling'; tickerEl.classList.remove('status-low','status-missed'); countEl.textContent = `0/${getItems().length}`; tickerIndex = 0; return; }
    const hasMissed = issues.some(i => i.type === 'missed');
    tickerEl.classList.remove('status-low','status-missed'); tickerEl.classList.add(hasMissed ? 'status-missed' : 'status-low');
    if (tickerIndex >= issues.length) tickerIndex = 0;
    msgEl.textContent = issues[tickerIndex].text; countEl.textContent = `${issues.length}/${getItems().length}`;
  }
  function cycleTicker() {
    if (cachedIssues.length <= 1) { renderTicker(); return; }
    const msgEl = document.getElementById('stackTickerMsg');
    msgEl.classList.add('is-fading');
    setTimeout(() => { tickerIndex++; renderTicker(); msgEl.classList.remove('is-fading'); }, 280);
  }
  function startTicker() { if (tickerInterval) clearInterval(tickerInterval); tickerInterval = setInterval(cycleTicker, 5000); }

  document.getElementById('stackGroups').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]'); if (!btn) return; e.stopPropagation();
    const id = btn.dataset.id;
    if (btn.dataset.action === 'toggle') toggleTaken(id);
    else if (btn.dataset.action === 'low') toggleLow(id);
    else if (btn.dataset.action === 'del') deleteItem(id);
  });
  document.getElementById('stackGroups').addEventListener('pointerdown', (e) => {
    const btn = e.target.closest('[data-action="del"]'); if (!btn) return;
    e.preventDefault(); e.stopPropagation(); deleteItem(btn.dataset.id);
  });
  document.getElementById('stackGroups').addEventListener('click', (e) => {
    const editEl = e.target.closest('[data-edit]'); if (!editEl) return;
    if (e.target.closest('[data-action]')) return;
    if (editEl.getAttribute('contenteditable') === 'true') return;
    startEdit(editEl);
  });

  function startEdit(el) {
    const id = el.dataset.id, field = el.dataset.edit;
    if (field === 'name') {
      const span = el.querySelector('.stack-item-name-text'); if (!span) return;
      span.setAttribute('contenteditable','true'); span.style.outline='1px solid rgba(255,255,255,0.25)'; span.style.outlineOffset='4px'; span.style.borderRadius='4px';
      span.focus(); placeCaretAtEnd(span);
      const finish = (commit) => { span.removeAttribute('contenteditable'); span.style.outline=''; span.style.outlineOffset=''; if (commit) { const v = span.textContent.trim(); if (v) updateItem(id,'name',v); else render(); } else render(); };
      span.addEventListener('blur', () => finish(true), { once: true });
      span.addEventListener('keydown', (e) => { if (e.key==='Enter'){e.preventDefault();span.blur();} if (e.key==='Escape'){span.blur();render();} });
    }
    if (field === 'meta') {
      el.setAttribute('contenteditable','true'); el.focus(); placeCaretAtEnd(el);
      const finish = (commit) => { el.removeAttribute('contenteditable'); if (commit) { const parts = el.textContent.trim().split(/\s*·\s*/); updateItem(id,'dose',parts[0]||''); updateItem(id,'note',parts.slice(1).join(' · ')); } render(); };
      el.addEventListener('blur', () => finish(true), { once: true });
      el.addEventListener('keydown', (e) => { if (e.key==='Enter'){e.preventDefault();el.blur();} if (e.key==='Escape'){el.blur();render();} });
    }
  }
  function placeCaretAtEnd(el) { const r=document.createRange(); r.selectNodeContents(el); r.collapse(false); const s=window.getSelection(); s.removeAllRanges(); s.addRange(r); }

  const nameInput = document.getElementById('stackAddName');
  const doseInput = document.getElementById('stackAddDose');
  const winSelect = document.getElementById('stackAddWindow');
  const addBtn    = document.getElementById('stackAddBtn');
  const resultsEl = document.getElementById('stackSearchResults');
  let pendingNote = '';

  function searchSupplements(q) {
    const query = q.toLowerCase().trim(); if (!query) return [];
    const starts = [], contains = [];
    SUPPLEMENT_DB.forEach(s => {
      const lc = s.name.toLowerCase(), aliases = (s.aliases||[]).map(a=>a.toLowerCase()), all=[lc,...aliases];
      if (all.some(n=>n.startsWith(query))) starts.push(s);
      else if (all.some(n=>n.includes(query))) contains.push(s);
    });
    return [...starts,...contains].slice(0,6);
  }
  function renderSearchResults(q) {
    const matches = searchSupplements(q);
    if (!q.trim() || !matches.length) { resultsEl.hidden=true; resultsEl.innerHTML=''; return; }
    resultsEl.hidden = false;
    resultsEl.innerHTML = matches.map(s => {
      const wm = STACK_WINDOWS.find(w=>w.key===s.window)||STACK_WINDOWS[3];
      return `<button class="stack-result" data-name="${escapeHtml(s.name)}" data-dose="${escapeHtml(s.dose)}" data-window="${s.window}" data-note="${escapeHtml(s.note)}"><div class="stack-result-icon">${s.icon||'💊'}</div><div class="stack-result-body"><div class="stack-result-name">${escapeHtml(s.name)}</div><div class="stack-result-meta">${escapeHtml(s.dose)} · ${wm.icon} ${wm.title.toLowerCase()} · ${escapeHtml(s.note)}</div></div></button>`;
    }).join('');
  }
  nameInput.addEventListener('input', () => { renderSearchResults(nameInput.value); pendingNote=''; });
  nameInput.addEventListener('focus', () => { if (nameInput.value.trim()) renderSearchResults(nameInput.value); });
  document.addEventListener('click', (e) => { if (!e.target.closest('.stack-name-wrap')) resultsEl.hidden=true; });
  resultsEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.stack-result'); if (!btn) return;
    nameInput.value=btn.dataset.name; doseInput.value=btn.dataset.dose; winSelect.value=btn.dataset.window; pendingNote=btn.dataset.note;
    resultsEl.hidden=true; addBtn.focus();
  });
  addBtn.addEventListener('click', () => { addItem(nameInput.value,doseInput.value,winSelect.value,pendingNote); nameInput.value=''; doseInput.value=''; pendingNote=''; resultsEl.hidden=true; nameInput.focus(); });
  [nameInput,doseInput].forEach(i => {
    i.addEventListener('keydown', (e) => {
      if (e.key==='Enter') { if (!resultsEl.hidden&&i===nameInput){const f=resultsEl.querySelector('.stack-result');if(f){e.preventDefault();f.click();return;}} addBtn.click(); }
      if (e.key==='Escape') resultsEl.hidden=true;
    });
  });

  setInterval(() => { const nk=`stack:taken:${getActiveDate()}`; if(nk!==todayKey) todayKey=nk; render(); }, 60000);
  render();
  startTicker();
})();
</script>
</body>
</html>
